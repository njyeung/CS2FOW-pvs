<!doctype html>
<!-- Local-only line-of-sight point editor. It reads ignored model assets and
     one preset; it does not connect to a server or change runtime state. -->
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="data:,">
	<title>CS2FOW line-of-sight point editor</title>
	<style>
		:root {
			color-scheme: dark;
			font-family: Segoe UI, Arial, sans-serif;
			background: #0b0e12;
			color: #f4f7fb;
		}
		* {
			box-sizing: border-box;
		}
		body {
			margin: 0;
			overflow: hidden;
		}
		#view {
			display: block;
			width: 100vw;
			height: 100vh;
		}
		.panel {
			position: fixed;
			inset: 16px 16px 16px auto;
			width: min(390px, calc(100vw - 32px));
			overflow: auto;
			padding: 12px;
			border: 1px solid #2b3442;
			background: rgba(12, 16, 22, 0.94);
		}
		h1 {
			margin: 0 0 8px;
			font-size: 20px;
			letter-spacing: 0;
		}
		fieldset {
			margin: 0 0 10px;
			padding: 9px;
			border: 1px solid #303a48;
		}
		legend {
			padding: 0 6px;
			font-weight: 700;
		}
		label {
			display: block;
			margin: 8px 0;
			font-size: 13px;
			color: #cbd5e1;
		}
		input, button {
			font: inherit;
		}
		input[type="number"], input[type="range"] {
			width: 100%;
		}
		input[type="file"] {
			width: 100%;
		}
		.hidden-file {
			display: none;
		}
		button {
			min-height: 32px;
			border: 1px solid #435064;
			background: #17202b;
			color: #f4f7fb;
			cursor: pointer;
		}
		button:hover {
			background: #223043;
		}
		.row {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
		}
		.actions {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
		}
		.actions.compact {
			grid-template-columns: repeat(2, 1fr);
		}
		table {
			width: 100%;
			border-collapse: collapse;
			font-size: 12px;
		}
		th, td {
			border-bottom: 1px solid #242d38;
			padding: 5px;
			text-align: left;
		}
		tr.selected {
			background: #233247;
		}
		td input {
			width: 70px;
			border: 1px solid #384557;
			background: #0f151d;
			color: #f4f7fb;
		}
		.status {
			white-space: pre-wrap;
			color: #9fb1c7;
			font-size: 12px;
			line-height: 1.45;
		}
		.ok {
			color: #79d986;
		}
		.bad {
			color: #ff7777;
		}
		.hint {
			color: #94a3b8;
			font-size: 12px;
			line-height: 1.45;
		}
	</style>
</head>
<body>
	<canvas id="view"></canvas>
	<section class="panel">
		<h1>CS2FOW LOS Point Editor</h1>
		<div id="self-check" class="status">self-check: running...</div>

		<fieldset>
			<legend>Model</legend>
			<div class="actions compact">
				<button id="load-sas">Load SAS GLB</button>
				<button id="reset-camera">Reset Camera</button>
			</div>
			<input id="sas-file" class="hidden-file" type="file" accept=".glb,.gltf">
			<label>Model opacity <input id="model-opacity" type="range" min="0.1" max="1" step="0.05" value="0.78"></label>
			<label>Point opacity <input id="point-opacity" type="range" min="0.25" max="1" step="0.05" value="1"></label>
		</fieldset>

		<fieldset>
			<legend>Weapon Preview</legend>
			<label>Weapon
				<select id="weapon-select">
					<option value="">none</option>
					<option value="usp_silencer">USP-S</option>
					<option value="m4a1_silencer">M4A1-S</option>
					<option value="awp">AWP</option>
				</select>
			</label>
			<button id="reset-weapon">Reset Grip</button>
			<div class="row">
				<label>X<input id="weapon-x" type="number" value="0" step="0.25"></label>
				<label>Y<input id="weapon-y" type="number" value="0" step="0.25"></label>
				<label>Z<input id="weapon-z" type="number" value="0" step="0.25"></label>
			</div>
			<div class="row">
				<label>Pitch<input id="weapon-rx" type="number" value="0" step="1"></label>
				<label>Yaw<input id="weapon-ry" type="number" value="0" step="1"></label>
				<label>Roll<input id="weapon-rz" type="number" value="0" step="1"></label>
			</div>
			<label>Scale <input id="weapon-scale" type="range" min="0.25" max="2" step="0.01" value="1"></label>
		</fieldset>

		<fieldset>
			<legend>Collision Bounds</legend>
			<div class="hint">AABB fallback dots are generated from these bounds and are not exported.</div>
			<div class="row">
				<label>Min X<input id="min-x" type="number" value="-16" step="1"></label>
				<label>Min Y<input id="min-y" type="number" value="-16" step="1"></label>
				<label>Min Z<input id="min-z" type="number" value="0" step="1"></label>
			</div>
			<div class="row">
				<label>Max X<input id="max-x" type="number" value="16" step="1"></label>
				<label>Max Y<input id="max-y" type="number" value="16" step="1"></label>
				<label>Max Z<input id="max-z" type="number" value="72" step="1"></label>
			</div>
		</fieldset>

		<fieldset>
			<legend>LOS Points</legend>
			<div class="actions">
				<button id="add-point">Add</button>
				<button id="duplicate-point">Duplicate</button>
				<button id="delete-point">Delete</button>
				<button id="reset-points">Reset</button>
				<button id="import-los">Import LOS</button>
				<button id="copy-json">Copy JSON</button>
				<button id="download-json">Download JSON</button>
			</div>
			<input id="import-json" class="hidden-file" type="file" accept=".json,application/json">
			<table>
				<thead>
					<tr><th>Name</th><th>X</th><th>Y</th><th>Z</th></tr>
				</thead>
				<tbody id="points-table"></tbody>
			</table>
		</fieldset>

		<fieldset>
			<legend>Status</legend>
			<div id="status" class="status"></div>
		</fieldset>
	</section>
	<script type="module" src="./viewer.js"></script>
</body>
</html>
